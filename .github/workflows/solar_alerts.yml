name: Solar Activity Alerts

on:
  schedule:
    # Vérifie toutes les heures pour les alertes
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force alert check even if no anomalies'
        required: false
        default: 'false'

jobs:
  check-solar-alerts:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 2. Python Setup
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ============================================================
      # 3. Install Dependencies
      # ============================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ============================================================
      # 4. Setup Alert Configuration
      # ============================================================
      - name: Create alert config
        run: |
          cat > alert_config.json << EOF
          {
            "email": {
              "smtp_server": "${{ secrets.ALERT_SMTP_SERVER }}",
              "smtp_port": ${{ secrets.ALERT_SMTP_PORT || 587 }},
              "sender_email": "${{ secrets.ALERT_SENDER_EMAIL }}",
              "sender_password": "${{ secrets.ALERT_SENDER_PASSWORD }}",
              "recipient_emails": "${{ secrets.ALERT_RECIPIENT_EMAILS }}",
              "enabled": true
            },
            "thresholds": {
              "proton_flux_pfu": ${{ secrets.ALERT_THRESHOLD || 10 }},
              "check_last_n_days": 7
            },
            "notifications": {
              "send_daily_summary": false,
              "send_only_on_alerts": true
            }
          }
          EOF

      # ============================================================
      # 5. Check for Solar Activity Anomalies
      # ============================================================
      - name: Run alert system
        id: check_alerts
        run: |
          cd scripts
          python solar_alert_system.py --check-only > ../alert_output.txt 2>&1
          echo "Alert check completed"
          cat ../alert_output.txt
        continue-on-error: true

      # ============================================================
      # 6. Create GitHub Issue on Critical Alert
      # ============================================================
      - name: Parse alerts and create issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Lire la sortie des alertes
            let alertOutput = '';
            try {
              alertOutput = fs.readFileSync('alert_output.txt', 'utf8');
            } catch (err) {
              console.log('No alert output found');
              return;
            }
            
            // Vérifier s'il y a des alertes critiques
            if (alertOutput.includes('ALERTE') || alertOutput.includes('anomalie')) {
              const date = new Date().toISOString().split('T')[0];
              
              // Créer une issue GitHub
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ Alerte Activité Solaire - ${date}`,
                body: `## 🌞 Alerte d'Activité Solaire Détectée\n\n` +
                      `**Date:** ${date}\n\n` +
                      `### Détails de l'alerte:\n\n` +
                      `\`\`\`\n${alertOutput}\n\`\`\`\n\n` +
                      `---\n` +
                      `*Cette alerte a été générée automatiquement par le workflow GitHub Actions.*\n` +
                      `*Consultez les données dans le dossier \`Protons/\` pour plus de détails.*`,
                labels: ['alert', 'solar-activity', 'automated']
              });
              
              console.log('GitHub issue created for solar alert');
            } else {
              console.log('No critical alerts detected');
            }

      # ============================================================
      # 7. Send Notification to Discord/Slack (Optional)
      # ============================================================
      - name: Send Discord notification
        if: contains(steps.check_alerts.outputs.*, 'ALERTE')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ ! -z "$DISCORD_WEBHOOK" ]; then
            ALERT_CONTENT=$(cat alert_output.txt | head -n 20)
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 **Alerte Activité Solaire**\n\`\`\`\n$ALERT_CONTENT\n\`\`\`\"}" \
              $DISCORD_WEBHOOK
          fi

      # ============================================================
      # 8. Archive Alert Data
      # ============================================================
      - name: Archive alert results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solar-alert-${{ github.run_number }}
          path: |
            alert_output.txt
            alert_config.json
          retention-days: 30

      # ============================================================
      # 9. Commit Alert History (Optional)
      # ============================================================
      - name: Update alert history
        if: contains(steps.check_alerts.outputs.*, 'ALERTE')
        run: |
          # Créer un fichier d'historique
          mkdir -p alerts_history
          DATE=$(date +%Y%m%d_%H%M%S)
          cp alert_output.txt "alerts_history/alert_${DATE}.txt"
          
          # Configurer git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Commit et push si des alertes ont été détectées
          git add alerts_history/
          git commit -m "📊 Alert history: ${DATE}" || echo "No changes to commit"
          git push || echo "Nothing to push"
