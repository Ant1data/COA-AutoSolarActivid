name: Solar Activity Alerts

on:
  schedule:
    # Vérifie toutes les heures pour les alertes
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force alert check even if no anomalies'
        required: false
        default: 'false'

jobs:
  check-solar-alerts:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 2. Python Setup
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ============================================================
      # 3. Install Dependencies
      # ============================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ============================================================
      # 4. Check for Solar Activity Anomalies
      # ============================================================
      - name: Run alert system
        id: check_alerts
        run: |
          cd scripts
          python solar_alert_system.py --check-only > ../alert_output.txt 2>&1
          echo "Alert check completed"
          cat ../alert_output.txt
        continue-on-error: true

      # ============================================================
      # 6. Update Alert Status File (only on anomaly)
      # ============================================================
      - name: Check for anomalies and update status
        id: check_anomaly
        run: |
          if grep -q "ALERTE DÉTECTÉE" alert_output.txt; then
            echo "anomaly_detected=true" >> $GITHUB_OUTPUT
            echo "✅ Anomalie détectée - le fichier sera mis à jour"
          else
            echo "anomaly_detected=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Pas d'anomalie - aucune sauvegarde"
          fi

      # ============================================================
      # 7. Send Notification to Discord/Slack (Optional)
      # ============================================================
      - name: Send Discord notification
        if: steps.check_anomaly.outputs.anomaly_detected == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ ! -z "$DISCORD_WEBHOOK" ]; then
            ALERT_CONTENT=$(cat alert_output.txt | head -n 20)
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 **Alerte Activité Solaire**\n\`\`\`\n$ALERT_CONTENT\n\`\`\`\"}" \
              $DISCORD_WEBHOOK
          fi

      # ============================================================
      # 8. Update Single Alert File (only on confirmed anomaly)
      # ============================================================
      - name: Update current alert status
        if: steps.check_anomaly.outputs.anomaly_detected == 'true'
        run: |
          # Créer ou mettre à jour UN SEUL fichier d'alerte
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          cat > CURRENT_SOLAR_ALERT.txt << EOF
          ╔══════════════════════════════════════════════════════════╗
          ║        ALERTE D'ACTIVITÉ SOLAIRE EN COURS                ║
          ╚══════════════════════════════════════════════════════════╝
          
          Dernière mise à jour : ${DATE}
          
          ════════════════════════════════════════════════════════════
          
          $(cat alert_output.txt)
          
          ════════════════════════════════════════════════════════════
          Source : NOAA SWPC (https://www.swpc.noaa.gov/)
          Système : COA-AutoSolarActivid
          ════════════════════════════════════════════════════════════
          EOF
          
          echo "✅ Fichier CURRENT_SOLAR_ALERT.txt mis à jour"

      # ============================================================
      # 9. Commit Updated Alert File (only if anomaly detected)
      # ============================================================
      - name: Commit alert file to repository
        if: steps.check_anomaly.outputs.anomaly_detected == 'true'
        run: |
          # Configurer git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Ajouter et commiter le fichier unique
          git pull --rebase
          git add CURRENT_SOLAR_ALERT.txt
          git commit -m "� Alerte solaire mise à jour - $(date -u +%Y%m%d_%H%M%S)" || echo "Pas de changement"
          git push || echo "Rien à pousser"
